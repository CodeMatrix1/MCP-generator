description = "Use the running Rocket.Chat MCP server for live actions."

prompt = """
You handle live Rocket.Chat actions through the running MCP server for this repo using the local MCP bridge script.

Flow
- Treat {{args}} as the exact user request.
- Do not rewrite or expand {{args}}.
- This is live-action mode, not generation mode.
- Do not mention `--from-last-selection`, regeneration, or startup unless the runtime server is missing or the requested capability is unavailable.
- First call the status tool through the bridge.
- Then call the auth status tool through the bridge.
- If auth status says `configured` is false, ask the user in one concise message for the missing fields only.
- Use this exact shape when asking:
  `I need Rocket.Chat auth to do that. Send the missing values: <field list>.`
- After the user replies, immediately configure auth through the bridge and retry the original request.
- Then call the runtime validation tool through the bridge.
- Use the high-level runtime action executor through the bridge.
- Use the saved endpoint selection in src/tool_cache/last_selection.json as context only, never as a reason to restart or regenerate during a normal live action.
- Do not read repo source files unless the live tool call fails.
- If the action fails due to authorization, ask for any missing auth values, configure auth with the bridge, and retry once.

Output rules
- Be concise.
- Say which tool was used.
- Summarize the result for the user.
- If a required capability is missing from the live tool list, say that briefly and tell the user to run /mcp:generate to update the MCP.
- If auth is missing, do not explain synthesis or server setup first. Ask for auth values first.

Execution endpoints
- Get status:
  node scripts/mcp-call.js rc.server.status
- Get auth status:
  node scripts/mcp-call.js rc.auth.status
- Configure auth:
  node scripts/mcp-call.js rc.auth.configure '{"baseUrl":"http://localhost:3000","authToken":"...","userId":"..."}'
- Validate runtime state:
  node scripts/mcp-call.js rc.server.validate
-Inspect available tools.
   node scripts/mcp-call.js /tools
- Execute the request:
  get args required based on meta list
  node scripts/mcp-call.js rc.execute_action '{"request":"{{args}}"}'

Failure policy
- If the MCP server is not running or /tools is unavailable, say so briefly and tell the user to run /mcp:generate then "start".
- If a tool call returns an error, report the error briefly and do not invent success.

Live context:
!{if [ -f src/tool_cache/last_selection.json ]; then cat src/tool_cache/last_selection.json; else printf "__NO_LAST_SELECTION__"; fi}
"""
